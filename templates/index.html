<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ShepherdAI Ultra</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0b1120; 
            --user-bubble: #1e3a8a; 
            --ai-bubble: rgba(255,255,255,0.05);   
            --accent: #3b82f6; 
            --success: #22c55e;
            --danger: #ef4444;
            --panel: rgba(17, 24, 39, 0.85);
            --glass-border: 1px solid rgba(255,255,255,0.1);
        }

        body, html { height: 100%; margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; display: flex; flex-direction: column; }

        /* --- PRE-LOADER --- */
        #preloader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease-out;
        }
        .intro-logo {
            font-size: 3rem; font-weight: bold; color: var(--accent);
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            animation: logoScale 1.5s ease;
        }
        .intro-sub { color: #64748b; letter-spacing: 3px; font-size: 14px; margin-top: 10px; }

        /* --- HEADER --- */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: rgba(11, 17, 32, 0.9); backdrop-filter: blur(10px); border-bottom: var(--glass-border); z-index: 1000; }
        .hamburger-toggle { font-size: 24px; cursor: pointer; color: var(--accent); position: relative; }
        .styled-title { font-size: 22px; font-weight: bold; background: linear-gradient(135deg, white 60%, var(--accent) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- HAMBURGER DROPDOWN --- */
        .hamburger-dropdown { 
            display: none; position: absolute; top: 45px; left: -10px; 
            background: var(--panel); backdrop-filter: blur(20px);
            border: var(--glass-border); border-radius: 12px;
            width: 230px; padding: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            z-index: 2000;
        }
        .hamburger-dropdown.active { display: block; animation: dropdownFadeIn 0.3s ease; }
        .dropdown-btn { 
            width: 100%; padding: 12px; margin-bottom: 5px; border-radius: 8px; 
            background: transparent; border: none; color: white; text-align: left; 
            cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 12px; 
            transition: 0.2s;
        }
        .dropdown-btn:hover { background: rgba(255,255,255,0.08); }
        .dropdown-btn.active { color: var(--accent); background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59,130,246,0.3); }

        /* --- CHAT AREA --- */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px 18px; border-radius: 18px; max-width: 80%; line-height: 1.5; font-size: 16px; animation: msgFadeIn 0.3s ease; }
        .user-msg { background: var(--user-bubble); align-self: flex-end; border-bottom-right-radius: 4px; border: var(--glass-border); color: #f1f5f9; }
        .ai-msg { background: var(--ai-bubble); align-self: flex-start; border-bottom-left-radius: 4px; border: var(--glass-border); backdrop-filter: blur(5px); }

        /* --- CHAT INPUT BAR --- */
        .chat-input-area { padding: 15px; background: rgba(11, 17, 32, 0.9); backdrop-filter: blur(10px); border-top: var(--glass-border); display: flex; align-items: center; gap: 12px; position: sticky; bottom: 0; }
        
        .bottom-plus-container { position: relative; }
        .bottom-plus-main { font-size: 26px; color: var(--accent); cursor: pointer; transition: transform 0.2s ease; }
        .bottom-fab-menu { 
            display: none; position: absolute; bottom: 55px; left: -5px;
            background: var(--panel); backdrop-filter: blur(20px);
            border: var(--glass-border); border-radius: 14px;
            width: 210px; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .bottom-fab-menu.active { display: block; animation: dropdownFadeIn 0.3s ease; }

        .chat-box { flex: 1; background: var(--panel); border: var(--glass-border); border-radius: 25px; padding: 5px 18px; display: flex; align-items: center; }
        #userInput { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; outline: none; font-size: 16px; font-weight: 500; }
        #userInput::placeholder { color: #64748b; }

        .icon-btn { color: #94a3b8; font-size: 20px; cursor: pointer; margin-left: 12px; transition: 0.2s; }
        .icon-btn:hover { color: var(--accent); }
        .icon-btn.active { color: var(--success); }

        .voice-options { 
            display: none; position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%);
            background: var(--panel); backdrop-filter: blur(20px); border: var(--glass-border);
            border-radius: 12px; width: 110px; padding: 6px; box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .voice-options.active { display: flex; flex-direction: column; gap: 4px; }

        #sendBtn { background: var(--success); color: #0f1120; font-weight: bold; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }

        .hidden-input { display: none; }
        
        @keyframes logoScale { 0% { opacity:0; transform: scale(0.8); } 100% { opacity:1; transform: scale(1); } }
        @keyframes dropdownFadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes msgFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="intro-logo">SHEPHERD<span style="color:white;">AI</span></div>
        <div class="intro-sub">ULTRA V4</div>
    </div>

    <div class="header">
        <div class="hamburger-toggle">
            <i class="fas fa-bars" onclick="toggleHamburger()"></i>
            <div class="hamburger-dropdown" id="hamburgerMenu">
                <button class="dropdown-btn active" onclick="newChat()"><i class="fas fa-plus"></i> New Chat</button>
                <button class="dropdown-btn" onclick="alert('Project Mode Enabled')"><i class="fas fa-folder-plus"></i> New Project</button>
                <button class="dropdown-btn" onclick="alert('Fetching History...')"><i class="fas fa-history"></i> Old Chat History</button>
                <hr style="border:0; border-top: var(--glass-border); margin:8px 0;">
                <button class="dropdown-btn model-selector" id="model-gpt-3" onclick="selectModel('gpt-3')"><i class="fas fa-brain"></i> GPT 3</button>
                <button class="dropdown-btn model-selector" id="model-gpt-4" onclick="selectModel('gpt-4')"><i class="fas fa-bolt"></i> GPT 4</button>
                <button class="dropdown-btn model-selector" id="model-gpt-5" onclick="selectModel('gpt-5')"><i class="fas fa-star"></i> GPT 5</button>
                <hr style="border:0; border-top: var(--glass-border); margin:8px 0;">
                <button class="dropdown-btn"><i class="fas fa-briefcase"></i> Workspace</button>
            </div>
        </div>
        <div class="styled-title">ShepherdAI ultra</div>
        <i class="fas fa-redo-alt" onclick="location.reload()" style="color:#64748b; cursor:pointer;"></i>
    </div>

    <div id="chat-container">
        <div class="msg ai-msg">Welcome, King. How can I help with?<br><span style="color:#94a3b8; font-size:14px;">code, summarize text, make plan...</span></div>
    </div>

    <div class="chat-input-area">
        <div class="bottom-plus-container">
            <i class="fas fa-plus-circle bottom-plus-main" onclick="toggleFab()"></i>
            <div class="bottom-fab-menu" id="fabMenu">
                <button class="dropdown-btn" onclick="triggerInput('cameraCapture')"><i class="fas fa-camera"></i> Camera</button>
                <button class="dropdown-btn" onclick="triggerInput('galleryPick')"><i class="fas fa-image"></i> Photo</button>
                <button class="dropdown-btn" onclick="triggerInput('fileInput')"><i class="fas fa-file-alt"></i> Files</button>
                <button class="dropdown-btn" onclick="toggleThinking()"><i class="fas fa-lightbulb"></i> <span id="thinking-text">Thinking: OFF</span></button>
                <button class="dropdown-btn" onclick="setMode('shopping')"><i class="fas fa-shopping-bag"></i> Shopping research</button>
                <button class="dropdown-btn" onclick="toggleWebSearch()"><i class="fas fa-globe"></i> <span id="web-search-text">Web search: OFF</span></button>
                <button class="dropdown-btn" onclick="setMode('quizzes')"><i class="fas fa-brain"></i> Quizzes</button>
            </div>
        </div>

        <div class="chat-box">
            <input type="text" id="userInput" placeholder="Ask ShepherdAI">
            <i class="fas fa-microphone icon-btn" id="micBtn" onclick="startVoice()"></i>
            <div style="position:relative;">
                <i class="fas fa-headphones icon-btn" id="voiceToggle" onclick="toggleVoiceOptions()"></i>
                <div class="voice-options" id="voiceMenu">
                    <button class="dropdown-btn" onclick="setVoiceType('male')">Male</button>
                    <button class="dropdown-btn" onclick="setVoiceType('female')">Female</button>
                </div>
            </div>
        </div>

        <button id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <input type="file" id="cameraCapture" class="hidden-input" accept="image/*" capture="environment" onchange="handleFileUpload(this)">
    <input type="file" id="galleryPick" class="hidden-input" accept="image/*" onchange="handleFileUpload(this)">
    <input type="file" id="fileInput" class="hidden-input" accept=".pdf,.doc,.txt" onchange="handleFileUpload(this)">

    <script>
        // State Management
        let currentModel = 'gpt-4';
        let webSearchActive = false;
        let thinkingMode = false;
        let currentMode = 'chat';

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(() => { document.getElementById('preloader').style.display = 'none'; }, 1000);
            }, 2000);
        });

        function toggleHamburger() { document.getElementById('hamburgerMenu').classList.toggle('active'); }
        function toggleFab() { document.getElementById('fabMenu').classList.toggle('active'); }
        function toggleVoiceOptions() { document.getElementById('voiceMenu').classList.toggle('active'); }

        // --- ACTIVE FEATURES (NO MOCK) ---

        function selectModel(model) { 
            currentModel = model;
            document.querySelectorAll('.model-selector').forEach(b => b.classList.remove('active'));
            document.getElementById(`model-${model}`).classList.add('active');
            toggleHamburger(); 
        }

        function toggleWebSearch() {
            webSearchActive = !webSearchActive;
            const text = document.getElementById('web-search-text');
            text.innerText = webSearchActive ? "Web search: ON" : "Web search: OFF";
            text.parentElement.style.color = webSearchActive ? "var(--success)" : "white";
            toggleFab();
        }

        function toggleThinking() {
            thinkingMode = !thinkingMode;
            const text = document.getElementById('thinking-text');
            text.innerText = thinkingMode ? "Thinking: ON" : "Thinking: OFF";
            text.parentElement.style.color = thinkingMode ? "var(--accent)" : "white";
            toggleFab();
        }

        function setMode(mode) {
            currentMode = mode;
            alert(`Switched to ${mode} mode`);
            toggleFab();
        }

        function triggerInput(id) { document.getElementById(id).click(); toggleFab(); }

        async function handleFileUpload(input) {
            if (!input.files[0]) return;
            const container = document.getElementById('chat-container');
            container.innerHTML += `<div class="msg user-msg"><i class="fas fa-file-upload"></i> Uploading: ${input.files[0].name}</div>`;
            // Logic to send file to backend can be added here
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const container = document.getElementById('chat-container');
            const userText = input.value.trim();
            
            if(!userText) return;

            // UI Update
            container.innerHTML += `<div class="msg user-msg">${userText}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            // AI Thinking State
            const aiMsgId = 'ai-' + Date.now();
            container.innerHTML += `<div class="msg ai-msg" id="${aiMsgId}"><i class="fas fa-spinner fa-spin"></i> ShepherdAI is thinking...</div>`;
            container.scrollTop = container.scrollHeight;

            try {
                const formData = new FormData();
                formData.append('message', userText);
                formData.append('model', currentModel);
                formData.append('web_search', webSearchActive);
                formData.append('thinking', thinkingMode);
                formData.append('mode', currentMode);

                const response = await fetch('/chat', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                document.getElementById(aiMsgId).innerHTML = data.reply;
            } catch (error) {
                document.getElementById(aiMsgId).innerHTML = "<span style='color:var(--danger)'>Connection Lost. Check Server.</span>";
            }
            container.scrollTop = container.scrollHeight;
        }

        function startVoice() {
            const mic = document.getElementById('micBtn');
            mic.classList.toggle('active');
            if(window.webkitSpeechRecognition) {
                const recognition = new webkitSpeechRecognition();
                recognition.onresult = (event) => {
                    document.getElementById('userInput').value = event.results[0][0].transcript;
                    sendMessage();
                };
                recognition.start();
            } else {
                alert("Voice not supported in this browser.");
            }
        }

        // Enter key to send
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
