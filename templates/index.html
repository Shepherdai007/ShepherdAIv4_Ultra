<script>
    // 1. Preloader Logic
    window.addEventListener('load', () => {
        setTimeout(() => {
            const preloader = document.getElementById('preloader');
            if(preloader) {
                preloader.style.opacity = '0';
                setTimeout(() => { preloader.style.display = 'none'; }, 1000);
            }
        }, 2000);
    });

    // 2. Global State (The "Brains" of the UI)
    let currentModel = 'gpt-4'; 
    let isWebSearchActive = false;

    // 3. UI Control Functions
    function toggleHamburger() { document.getElementById('hamburgerMenu').classList.toggle('active'); }
    function toggleFab() { document.getElementById('fabMenu').classList.toggle('active'); }
    function toggleVoiceOptions() { document.getElementById('voiceMenu').classList.toggle('active'); }

    // Connect the Model Buttons
    function selectModel(model) { 
        currentModel = model;
        // Visual feedback: Update all buttons, highlight the active one
        document.querySelectorAll('.dropdown-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        console.log(`Model switched to: ${model}`);
        toggleHamburger(); 
    }

    // ACTIVATE WEB SEARCH BUTTON
    function toggleWebSearch() {
        isWebSearchActive = !isWebSearchActive;
        const searchBtn = event.currentTarget;
        
        if (isWebSearchActive) {
            searchBtn.style.color = '#22c55e'; // Turn Green
            searchBtn.innerHTML = '<i class="fas fa-globe"></i> Web Search: ON';
        } else {
            searchBtn.style.color = 'white';
            searchBtn.innerHTML = '<i class="fas fa-globe"></i> Web Search';
        }
        console.log(`Web Search is now: ${isWebSearchActive}`);
        toggleFab(); // Close menu after clicking
    }

    function triggerInput(id) { 
        document.getElementById(id).click(); 
        toggleFab(); 
    }

    // 4. THE LIVE CHAT ENGINE
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const container = document.getElementById('chat-container');
        const userText = input.value.trim();

        if(!userText) return;

        // Display User Message
        container.innerHTML += `<div class="msg user-msg">${userText}</div>`;
        input.value = '';
        container.scrollTop = container.scrollHeight;

        // Create Thinking Bubble
        const aiBubbleId = 'ai-' + Date.now();
        container.innerHTML += `<div class="msg ai-msg" id="${aiBubbleId}"><i class="fas fa-spinner fa-spin"></i> ShepherdAI is thinking...</div>`;
        container.scrollTop = container.scrollHeight;

        try {
            const formData = new FormData();
            formData.append('message', userText);
            formData.append('model', currentModel);
            
            // This tells the Python server whether to use Tavily or not
            if(isWebSearchActive) {
                formData.append('search', 'true');
            }

            const response = await fetch('/chat', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            const aiBubble = document.getElementById(aiBubbleId);

            if (data.status === 'success') {
                aiBubble.innerHTML = data.reply;
            } else {
                aiBubble.innerHTML = "<span style='color:#ef4444;'>Connection lost, King. Check Render logs.</span>";
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById(aiBubbleId).innerHTML = "<span style='color:#ef4444;'>Server is sleeping. Refresh in 5 seconds.</span>";
        }
        container.scrollTop = container.scrollHeight;
    }

    // Handle "Enter" Key
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js');
    }
</script>
